<section id="moduleRoot" class="trz-review" data-trz-review>
  <div class="trz-review__panel">
    <h1 class="trz-review__title" data-trz-title data-i18n="trazabilidadReview.titlePeru">
      Revisión de Trazabilidad AGV – Perú
    </h1>

    <div class="trz-review__form">
      <label class="trz-review__label" for="trzReviewInput">
        <i data-lucide="scan-barcode" aria-hidden="true"></i>
        <span data-trz-label-text data-i18n="trazabilidadReview.inputLabelPeru">
          Ingrese Código de Trazabilidad (Perú)
        </span>
      </label>
      <div class="trz-review__row">
        <input
          id="trzReviewInput"
          class="trz-review__input"
          type="text"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
          placeholder="4A07A00125216"
          data-trz-input
          data-i18n-placeholder="trazabilidadReview.placeholder"
        />
        <button type="button" class="trz-review__btn trz-review__btn--primary" data-trz-split data-i18n="trazabilidadReview.split">
          Separar Código
        </button>
        <button type="button" class="trz-review__btn trz-review__btn--muted" data-trz-clear data-i18n="trazabilidadReview.clear">
          Limpiar
        </button>
      </div>
      <p class="trz-review__error" data-trz-error hidden></p>
    </div>

    <div class="trz-review__split" data-trz-split-box>
      <table class="trz-review__matrix" data-trz-matrix aria-label="Desglose del código"></table>
    </div>

    <div class="trz-review__meaning" data-trz-meaning>
      <h2 class="trz-review__meaning-title" data-i18n="trazabilidadReview.meaningTitle">
        Resultado para gerencia
      </h2>
      <div class="trz-review__meaning-grid" data-trz-meaning-grid></div>
    </div>
  </div>
</section>
