<section id="moduleRoot" class="cartillas-page" data-cartillas-root>
  <header class="cartillas-page__hero">
    <div>
      <p class="cartillas-page__eyebrow" data-i18n="cartillas.eyebrow">Catálogo AGV</p>
      <h1 class="cartillas-page__title" data-i18n="cartillas.title">Cartillas por cultivo</h1>
      <p class="cartillas-page__lead" data-i18n="cartillas.description">
        Códigos e identificadores de cartillas de inspección, organizados por cultivo para identificación rápida.
      </p>
    </div>
    <div class="cartillas-page__summary" data-cartillas-summary aria-live="polite"></div>
  </header>

  <div class="cartillas-page__sticky" data-cartillas-sticky>
    <div class="cartillas-page__filters" role="tablist" aria-label="Filtro por cultivo" data-cartillas-filters></div>
    <label class="cartillas-page__search" for="cartillasSearch">
      <i data-lucide="search" aria-hidden="true"></i>
      <input
        id="cartillasSearch"
        type="search"
        autocomplete="off"
        data-cartillas-search
        data-i18n-placeholder="cartillas.searchPlaceholder"
        placeholder="Buscar por nombre, código o ID…"
      />
      <button type="button" class="cartillas-page__clear" data-cartillas-clear hidden data-i18n="cartillas.clearSearch">
        Limpiar
      </button>
    </label>
  </div>

  <div class="cartillas-page__empresa-wrap" data-cartillas-empresa>
    <table class="cartillas-empresa-table">
      <thead>
        <tr>
          <th data-i18n="cartillas.col.estado">Estado</th>
          <th data-i18n="cartillas.col.empresaCodigo">Empresa Código</th>
          <th data-i18n="cartillas.col.empresaNombre">Empresa nombre</th>
          <th data-i18n="cartillas.col.mandanteId">Mandante Id</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="cartillas-status cartillas-status--ok" data-i18n="cartillas.statusAvailable">Disponible</span></td>
          <td>PE10</td>
          <td>Agrovisión Perú SAC</td>
          <td>300</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="cartillas-page__crops" data-cartillas-crops></div>
</section>
