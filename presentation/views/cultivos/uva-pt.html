<section id="moduleRoot" class="module-panel crop-module agv-pt-module-shell">
  <div id="agvPtApp" class="agv-pt-app">

    <header class="agv-pt-header">
      <div class="agv-pt-header__start">
        <span class="agv-pt-header__mark" aria-hidden="true">
          <i data-lucide="clipboard-check"></i>
        </span>
        <div class="agv-pt-header__body">
          <h2 class="agv-pt-header__title" data-i18n="cultivo.uvaPt.title"></h2>
          <p class="agv-pt-header__subtitle" data-i18n="cultivo.uvaPt.description"></p>
        </div>
      </div>
      <button
        type="button"
        id="agv-pt-live-badge"
        class="agv-pt-live"
        data-i18n-title="ptUva.liveTitleIdle"
        title=""
        aria-live="polite"
      >
        <span class="agv-pt-live__dot" aria-hidden="true"></span>
        <span id="agv-pt-live-label" data-i18n="ptUva.liveIdle"></span>
      </button>
    </header>

    <div class="agv-pt-workspace">
      <div class="agv-pt-panel">
        <div class="agv-pt-panel__section">
          <p class="agv-pt-panel__eyebrow" data-i18n="ptUva.panelParams"></p>
          <div class="agv-pt-toolbar agv-pt-toolbar--filters">
            <div class="agv-pt-toolbar__group agv-pt-toolbar__group--file">
              <span class="agv-pt-field__label">
                <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                <span data-i18n="ptUva.loadExcel"></span>
              </span>
              <div id="agv-pt-file-wrap" class="agv-pt-file-wrap">
                <input type="file" id="agv-pt-file-input" class="agv-pt-file-input" accept=".xlsx,.xls" />
              </div>
            </div>

            <div class="agv-pt-toolbar__group">
              <label class="agv-pt-field__label" for="agv-pt-inspection-date">
                <i data-lucide="calendar-search" aria-hidden="true"></i>
                <span data-i18n="ptUva.inspectionDate"></span>
              </label>
              <div class="agv-pt-field">
                <i data-lucide="calendar-search" class="agv-pt-field__icon" aria-hidden="true"></i>
                <select id="agv-pt-inspection-date" class="agv-pt-input agv-pt-input--icon" disabled>
                  <option value="" disabled selected data-i18n="ptUva.selectDate"></option>
                </select>
              </div>
            </div>

            <div class="agv-pt-toolbar__group">
              <label class="agv-pt-field__label" for="agv-pt-harvest-date">
                <i data-lucide="leaf" aria-hidden="true"></i>
                <span data-i18n="ptUva.harvestDate"></span>
              </label>
              <div class="agv-pt-field">
                <i data-lucide="leaf" class="agv-pt-field__icon" aria-hidden="true"></i>
                <select id="agv-pt-harvest-date" class="agv-pt-input agv-pt-input--icon agv-pt-input--readonly" disabled>
                  <option value="" selected data-i18n="ptUva.autoDate"></option>
                </select>
              </div>
            </div>

            <div class="agv-pt-toolbar__group">
              <label class="agv-pt-field__label" for="agv-pt-lmr-date">
                <i data-lucide="calendar-days" aria-hidden="true"></i>
                <span data-i18n="ptUva.lmrDateLabel"></span>
              </label>
              <div class="agv-pt-field">
                <i data-lucide="calendar-days" class="agv-pt-field__icon" aria-hidden="true"></i>
                <select id="agv-pt-lmr-date" class="agv-pt-input agv-pt-input--icon agv-pt-input--readonly" disabled>
                  <option value="" selected data-i18n="ptUva.lmrAutoDate"></option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="agv-pt-panel__section agv-pt-panel__section--actions">
          <div class="agv-pt-actions-layout">
            <div class="agv-pt-actions-block">
              <p class="agv-pt-panel__eyebrow" data-i18n="ptUva.panelActions"></p>
              <div class="agv-pt-actions">
                <button type="button" id="agv-pt-run-review" class="agv-pt-btn agv-pt-btn--primary" disabled>
                  <i data-lucide="play" aria-hidden="true"></i>
                  <span data-i18n="ptUva.runReview"></span>
                </button>
                <button type="button" id="agv-pt-export-filtered" class="agv-pt-btn agv-pt-btn--upload" disabled>
                  <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                  <span data-i18n="ptUva.exportFiltered"></span>
                </button>
                <button type="button" id="agv-pt-clear" class="agv-pt-btn agv-pt-btn--ghost">
                  <i data-lucide="rotate-ccw" aria-hidden="true"></i>
                  <span data-i18n="ptUva.clear"></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <aside
        id="agv-pt-excel-insight"
        class="agv-pt-excel-insight"
        data-i18n-aria-label="ptUva.excelInsightTitle"
        aria-label=""
      ></aside>
    </div>

    <div class="agv-pt-guide" data-i18n-aria-label="ptUva.infoLead" aria-label="">
      <ol class="agv-pt-guide__flow">
        <li class="agv-pt-guide__step">
          <span class="agv-pt-guide__step-index">01</span>
          <span class="agv-pt-guide__step-icon" aria-hidden="true"><i data-lucide="file-check-2"></i></span>
          <p class="agv-pt-guide__step-text" data-i18n="ptUva.infoItem1"></p>
        </li>
        <li class="agv-pt-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-pt-guide__step">
          <span class="agv-pt-guide__step-index">02</span>
          <span class="agv-pt-guide__step-icon" aria-hidden="true"><i data-lucide="calendar-search"></i></span>
          <p class="agv-pt-guide__step-text" data-i18n="ptUva.infoItem2"></p>
        </li>
        <li class="agv-pt-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-pt-guide__step">
          <span class="agv-pt-guide__step-index">03</span>
          <span class="agv-pt-guide__step-icon" aria-hidden="true"><i data-lucide="table"></i></span>
          <p class="agv-pt-guide__step-text" data-i18n="ptUva.infoItem3"></p>
        </li>
        <li class="agv-pt-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-pt-guide__step">
          <span class="agv-pt-guide__step-index">04</span>
          <span class="agv-pt-guide__step-icon" aria-hidden="true"><i data-lucide="search"></i></span>
          <p class="agv-pt-guide__step-text" data-i18n="ptUva.infoItem4"></p>
        </li>
        <li class="agv-pt-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-pt-guide__step">
          <span class="agv-pt-guide__step-index">05</span>
          <span class="agv-pt-guide__step-icon" aria-hidden="true"><i data-lucide="refresh-cw"></i></span>
          <p class="agv-pt-guide__step-text" data-i18n="ptUva.infoItem5"></p>
        </li>
      </ol>
    </div>

    <section id="agv-pt-results-section" class="agv-pt-results" aria-live="polite" hidden>
      <header class="agv-pt-results__bar">
        <div class="agv-pt-results__lead">
          <h3 id="agv-pt-results-title" class="agv-pt-results__title" data-i18n="ptUva.resultsTitle"></h3>
        </div>
        <div class="agv-pt-results__bar-end">
          <span id="agv-pt-total-filas" class="agv-pt-results__chip"></span>
          <div id="agv-pt-table-search-wrap" class="agv-pt-table-search-wrap" hidden>
            <input
              type="text"
              id="agv-pt-table-search"
              class="agv-pt-table-search"
              data-i18n-placeholder="ptUva.searchPlaceholder"
              placeholder="Buscar por ID o Lote..."
            />
          </div>
        </div>
      </header>

      <div id="agv-pt-table-wrap" class="agv-pt-table-wrap">
        <table id="agv-pt-results-table" class="agv-pt-table agv-pt-table--compact agv-pt-table--uva">
          <thead>
            <tr id="agv-pt-results-header"></tr>
          </thead>
          <tbody id="agv-pt-results-body"></tbody>
        </table>
      </div>
    </section>

    <div id="agv-pt-col-menu" class="agv-pt-col-menu" hidden></div>

  </div>
</section>
