<section id="moduleRoot" class="module-panel crop-module agv-mp-module-shell">
  <div id="agvMpApp" class="agv-mp-app">

    <header class="agv-mp-header">
      <div class="agv-mp-header__start">
        <span class="agv-mp-header__mark" aria-hidden="true">
          <i data-lucide="clipboard-check"></i>
        </span>
        <div class="agv-mp-header__body">
          <h2 class="agv-mp-header__title" data-i18n="cultivo.paltaPlagas.title"></h2>
          <p class="agv-mp-header__subtitle" data-i18n="cultivo.paltaPlagas.description"></p>
        </div>
      </div>
      <button type="button" id="agv-mp-live-badge" class="agv-mp-live" data-i18n-title="plagasPalta.liveTitleIdle" title="" aria-live="polite">
        <span class="agv-mp-live__dot" aria-hidden="true"></span>
        <span id="agv-mp-live-label" data-i18n="paltaPlagas.liveIdle"></span>
      </button>
    </header>

    <div class="agv-mp-workspace">
      <div class="agv-mp-panel">
        <div class="agv-mp-panel__section">
          <p class="agv-mp-panel__eyebrow" data-i18n="plagasPalta.panelParams"></p>
          <div class="agv-mp-toolbar agv-mp-toolbar--filters">
            <div class="agv-mp-toolbar__group agv-mp-toolbar__group--file">
              <span class="agv-mp-field__label">
                <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                <span data-i18n="plagasPalta.loadExcel"></span>
              </span>
              <div id="agv-mp-file-wrap" class="agv-mp-file-wrap">
                <input type="file" id="agv-mp-file-input" class="agv-mp-file-input" accept=".xlsx,.xls" />
              </div>
            </div>

            <div class="agv-mp-toolbar__group">
              <label class="agv-mp-field__label" for="agv-mp-inspection-date">
                <i data-lucide="calendar" aria-hidden="true"></i>
                <span data-i18n="plagasPalta.inspectionDate"></span>
              </label>
              <div class="agv-mp-field">
                <i data-lucide="calendar" class="agv-mp-field__icon" aria-hidden="true"></i>
                <select id="agv-mp-inspection-date" class="agv-mp-input agv-mp-input--icon" disabled>
                  <option value="" disabled selected data-i18n="plagasPalta.selectDate"></option>
                </select>
              </div>
            </div>

            <div class="agv-mp-toolbar__group">
              <label class="agv-mp-field__label" for="agv-mp-harvest-date">
                <i data-lucide="leaf" aria-hidden="true"></i>
                <span data-i18n="plagasPalta.harvestDate"></span>
              </label>
              <div class="agv-mp-field">
                <i data-lucide="leaf" class="agv-mp-field__icon" aria-hidden="true"></i>
                <select id="agv-mp-harvest-date" class="agv-mp-input agv-mp-input--icon agv-mp-input--readonly" disabled aria-readonly="true" tabindex="-1">
                  <option value="" selected data-i18n="plagasPalta.autoDate"></option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="agv-mp-panel__section agv-mp-panel__section--actions">
          <div class="agv-mp-actions-layout">
            <div class="agv-mp-actions-block">
              <p class="agv-mp-panel__eyebrow" data-i18n="plagasPalta.panelActions"></p>
              <div class="agv-mp-actions">
                <button type="button" id="agv-mp-run-review" class="agv-mp-btn agv-mp-btn--primary" disabled>
                  <i data-lucide="play" aria-hidden="true"></i>
                  <span data-i18n="plagasPalta.runReview"></span>
                </button>
                <button type="button" id="agv-mp-export-filtered" class="agv-mp-btn agv-mp-btn--upload" disabled>
                  <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                  <span data-i18n="plagasPalta.exportFiltered"></span>
                </button>
                <button type="button" id="agv-mp-clear" class="agv-mp-btn agv-mp-btn--ghost">
                  <i data-lucide="rotate-ccw" aria-hidden="true"></i>
                  <span data-i18n="plagasPalta.clear"></span>
                </button>
              </div>
            </div>

            <div class="agv-mp-actions-block agv-mp-actions-block--quick">
              <p class="agv-mp-panel__eyebrow" data-i18n="plagasPalta.reviewAllExcel"></p>
              <div class="agv-mp-quick">
                <button type="button" id="agv-mp-review-all" class="agv-mp-btn agv-mp-btn--outline" disabled data-i18n-title="paltaPlagas.reviewAllTitle" title="">
                  <i data-lucide="layout-grid" aria-hidden="true"></i>
                  <span data-i18n="plagasPalta.reviewAll"></span>
                </button>
                <button type="button" id="agv-mp-export-errors" class="agv-mp-btn agv-mp-btn--upload agv-mp-btn--square" disabled data-i18n-title="paltaPlagas.exportErrorsTitle" data-i18n-aria-label="paltaPlagas.exportErrorsTitle" title="" aria-label="">
                  <i data-lucide="file-down" aria-hidden="true"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <aside id="agv-mp-excel-insight" class="agv-mp-excel-insight" data-i18n-aria-label="plagasPalta.excelInsightTitle" aria-label=""></aside>
    </div>

    <div class="agv-mp-guide" data-i18n-aria-label="plagasPalta.infoLead" aria-label="">
      <ol class="agv-mp-guide__flow">
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">01</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="file-check-2"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasPalta.infoItem1"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">02</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="calendar-search"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasPalta.infoItem2"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">03</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="layout-grid"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasPalta.infoItem3"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">04</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="file-down"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasPalta.infoItem4"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">05</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="refresh-cw"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasPalta.infoItem5"></p>
        </li>
      </ol>
    </div>

    <div id="agv-mp-resumen-todas" class="agv-mp-resumen" hidden></div>

    <section id="agv-mp-results-section" class="agv-mp-results" aria-live="polite" hidden>
      <header class="agv-mp-results__head">
        <span id="agv-mp-results-icon" class="agv-mp-results__icon" aria-hidden="true">
          <i data-lucide="triangle-alert"></i>
        </span>
        <div class="agv-mp-results__titles">
          <h3 id="agv-mp-results-title" class="agv-mp-results__title" data-i18n="plagasPalta.errorRowsTitle"></h3>
          <p id="agv-mp-results-subtitle" class="agv-mp-results__subtitle"></p>
        </div>
        <div id="agv-mp-total-filas" class="agv-mp-results__count"></div>
      </header>
      <div class="agv-mp-table-scroll">
        <table id="agv-mp-results-table" class="agv-mp-table" hidden>
          <thead><tr id="agv-mp-results-header"></tr></thead>
          <tbody id="agv-mp-results-body"></tbody>
        </table>
      </div>
    </section>

  </div>
</section>
