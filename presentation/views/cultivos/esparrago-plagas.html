<section id="moduleRoot" class="module-panel crop-module agv-mp-module-shell">
  <div id="agvMpApp" class="agv-mp-app">

    <header class="agv-mp-header">
      <div class="agv-mp-header__start">
        <span class="agv-mp-header__mark" aria-hidden="true">
          <i data-lucide="clipboard-check"></i>
        </span>
        <div class="agv-mp-header__body">
          <h2 class="agv-mp-header__title" data-i18n="cultivo.esparragoPlagas.title"></h2>
          <p class="agv-mp-header__subtitle" data-i18n="cultivo.esparragoPlagas.description"></p>
        </div>
      </div>
      <button type="button" id="agv-mp-live-badge" class="agv-mp-live" data-i18n-title="plagasEsparrago.liveTitleIdle" title="" aria-live="polite">
        <span class="agv-mp-live__dot" aria-hidden="true"></span>
        <span id="agv-mp-live-label" data-i18n="plagasEsparrago.liveIdle"></span>
      </button>
    </header>

    <div class="agv-mp-workspace">
      <div class="agv-mp-panel">
        <div class="agv-mp-panel__section">
          <p class="agv-mp-panel__eyebrow" data-i18n="plagasEsparrago.panelParams"></p>
          <div class="agv-mp-toolbar agv-mp-toolbar--filters">
            <div class="agv-mp-toolbar__group agv-mp-toolbar__group--file">
              <span class="agv-mp-field__label">
                <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
                <span data-i18n="plagasEsparrago.loadExcel"></span>
              </span>
              <div id="agv-mp-file-wrap" class="agv-mp-file-wrap">
                <input type="file" id="agv-mp-file-input" class="agv-mp-file-input" accept=".xlsx,.xls" multiple />
              </div>
            </div>

            <div class="agv-mp-toolbar__group agv-mp-toolbar__group--cartilla">
              <label class="agv-mp-field__label" for="agv-mp-inspection-type">
                <i data-lucide="file-text" aria-hidden="true"></i>
                <span data-i18n="plagasEsparrago.selectType"></span>
              </label>
              <div class="agv-mp-field">
                <i data-lucide="file-text" class="agv-mp-field__icon" aria-hidden="true"></i>
                <select id="agv-mp-inspection-type" class="agv-mp-input agv-mp-input--icon" disabled>
                  <option value="" disabled selected data-i18n="plagasEsparrago.selectTypeOption"></option>
                </select>
              </div>
            </div>

            <div class="agv-mp-toolbar__group">
              <label class="agv-mp-field__label" for="agv-mp-inspection-date">
                <i data-lucide="calendar" aria-hidden="true"></i>
                <span data-i18n="plagasEsparrago.inspectionDate"></span>
              </label>
              <div class="agv-mp-field">
                <i data-lucide="calendar" class="agv-mp-field__icon" aria-hidden="true"></i>
                <select id="agv-mp-inspection-date" class="agv-mp-input agv-mp-input--icon" disabled>
                  <option value="" disabled selected data-i18n="plagasEsparrago.selectDate"></option>
                </select>
              </div>
            </div>

            <div class="agv-mp-toolbar__group agv-mp-toolbar__group--quick">
              <span class="agv-mp-field__label">
                <i data-lucide="layout-grid" aria-hidden="true"></i>
                <span data-i18n="plagasEsparrago.reviewAllExcel"></span>
              </span>
              <div class="agv-mp-quick">
                <button type="button" id="agv-mp-review-all" class="agv-mp-btn agv-mp-btn--outline" disabled data-i18n-title="plagasEsparrago.reviewAllTitle" title="">
                  <i data-lucide="layout-grid" aria-hidden="true"></i>
                  <span data-i18n="plagasEsparrago.reviewAll"></span>
                </button>
                <button type="button" id="agv-mp-export-errors" class="agv-mp-btn agv-mp-btn--upload agv-mp-btn--square" disabled data-i18n-title="plagasEsparrago.exportErrorsTitle" data-i18n-aria-label="plagasEsparrago.exportErrorsTitle" title="" aria-label="">
                  <i data-lucide="file-down" aria-hidden="true"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="agv-mp-panel__section agv-mp-panel__section--actions">
          <p class="agv-mp-panel__eyebrow" data-i18n="plagasEsparrago.panelActions"></p>
          <div class="agv-mp-actions">
            <button type="button" id="agv-mp-run-review" class="agv-mp-btn agv-mp-btn--primary" disabled>
              <i data-lucide="play" aria-hidden="true"></i>
              <span data-i18n="plagasEsparrago.runReview"></span>
            </button>
            <button type="button" id="agv-mp-export-filtered" class="agv-mp-btn agv-mp-btn--upload" disabled>
              <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
              <span data-i18n="plagasEsparrago.exportFiltered"></span>
            </button>
            <button type="button" id="agv-mp-clear" class="agv-mp-btn agv-mp-btn--ghost">
              <i data-lucide="rotate-ccw" aria-hidden="true"></i>
              <span data-i18n="plagasEsparrago.clear"></span>
            </button>
          </div>
        </div>
      </div>

      <aside id="agv-mp-excel-insight" class="agv-mp-excel-insight" data-i18n-aria-label="plagasEsparrago.excelInsightTitle" aria-label=""></aside>
    </div>

    <div class="agv-mp-guide" data-i18n-aria-label="plagasEsparrago.infoLead" aria-label="">
      <ol class="agv-mp-guide__flow">
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">01</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="file-check-2"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasEsparrago.infoItem1"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">02</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="calendar-search"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasEsparrago.infoItem2"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">03</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="layout-grid"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasEsparrago.infoItem3"></p>
        </li>
        <li class="agv-mp-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="agv-mp-guide__step">
          <span class="agv-mp-guide__step-index">04</span>
          <span class="agv-mp-guide__step-icon" aria-hidden="true"><i data-lucide="file-down"></i></span>
          <p class="agv-mp-guide__step-text" data-i18n="plagasEsparrago.infoItem4"></p>
        </li>
      </ol>
    </div>

    <div id="agv-mp-resumen-todas" class="agv-mp-resumen" hidden></div>

    <section id="agv-mp-results-section" class="agv-mp-results agv-mp-results--compare" aria-live="polite" hidden>
      <div id="agv-mp-compare-summary" class="agv-mp-compare-summary"></div>
      <div id="agv-mp-compare-grid" class="agv-mp-compare-grid">
        <div class="agv-mp-compare-pane agv-mp-compare-pane--ipp">
          <h4 class="agv-mp-compare-pane__title" data-i18n="plagasEsparrago.ippPaneTitle"></h4>
          <div class="agv-mp-table-scroll">
            <table class="agv-mp-table agv-mp-table--compare">
              <thead><tr id="agv-mp-compare-header-ipp"></tr></thead>
              <tbody id="agv-mp-compare-body-ipp"></tbody>
            </table>
          </div>
        </div>
        <div class="agv-mp-compare-pane agv-mp-compare-pane--isp">
          <h4 class="agv-mp-compare-pane__title" data-i18n="plagasEsparrago.ispPaneTitle"></h4>
          <div class="agv-mp-table-scroll">
            <table class="agv-mp-table agv-mp-table--compare">
              <thead><tr id="agv-mp-compare-header-isp"></tr></thead>
              <tbody id="agv-mp-compare-body-isp"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

  </div>
</section>
