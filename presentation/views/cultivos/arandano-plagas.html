<section id="moduleRoot" class="module-panel crop-module pmpar-module-shell">
  <div id="pmparApp" class="pmpar-app">

    <header class="pmpar-header">
      <div class="pmpar-header__start">
        <span class="pmpar-header__mark" aria-hidden="true">
          <i data-lucide="clipboard-check"></i>
        </span>
        <div class="pmpar-header__body">
          <h2 class="pmpar-header__title" data-i18n="plagasArandano.pageTitle"></h2>
          <p class="pmpar-header__subtitle" data-i18n="plagasArandano.pageSubtitle"></p>
        </div>
      </div>
      <button
        type="button"
        id="pmpar-live-badge"
        class="pmpar-live"
        data-i18n-title="plagasArandano.liveTitleIdle"
        title=""
        aria-live="polite"
      >
        <span class="pmpar-live__dot" aria-hidden="true"></span>
        <span id="pmpar-live-label" data-i18n="plagasArandano.liveIdle"></span>
      </button>
    </header>

    <div class="pmpar-workspace">
    <div class="pmpar-panel">
      <div class="pmpar-panel__section">
        <p class="pmpar-panel__eyebrow" data-i18n="plagasArandano.panelParams"></p>
        <div class="pmpar-toolbar pmpar-toolbar--filters">
        <div class="pmpar-toolbar__group pmpar-toolbar__group--file">
          <span class="pmpar-field__label">
            <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
            <span data-i18n="plagasArandano.loadExcel"></span>
          </span>
          <div id="pmpar-file-wrap" class="pmpar-file-wrap">
            <input type="file" id="pmpar-file-input" class="pmpar-file-input" accept=".xlsx,.xls" />
          </div>
        </div>

        <div class="pmpar-toolbar__group">
          <label class="pmpar-field__label" for="pmpar-inspection-date">
            <i data-lucide="calendar" aria-hidden="true"></i>
            <span data-i18n="plagasArandano.inspectionDate"></span>
          </label>
          <div class="pmpar-field">
            <i data-lucide="calendar" class="pmpar-field__icon" aria-hidden="true"></i>
            <select id="pmpar-inspection-date" class="pmpar-input pmpar-input--icon" disabled>
              <option value="" disabled selected data-i18n="plagasArandano.selectDate"></option>
            </select>
          </div>
        </div>

        <div class="pmpar-toolbar__group">
          <label class="pmpar-field__label" for="pmpar-harvest-date">
            <i data-lucide="calendar-days" aria-hidden="true"></i>
            <span data-i18n="plagasArandano.harvestDate"></span>
          </label>
          <div class="pmpar-field">
            <i data-lucide="calendar-days" class="pmpar-field__icon" aria-hidden="true"></i>
            <select id="pmpar-harvest-date" class="pmpar-input pmpar-input--icon" disabled>
              <option value="" selected data-i18n="plagasArandano.autoDate"></option>
            </select>
          </div>
        </div>

        <div class="pmpar-toolbar__group pmpar-toolbar__group--quick">
          <span class="pmpar-field__label">
            <i data-lucide="layout-grid" aria-hidden="true"></i>
            <span data-i18n="plagasArandano.reviewAllExcel"></span>
          </span>
          <div class="pmpar-quick">
            <button type="button" id="pmpar-review-all" class="pmpar-btn pmpar-btn--outline" disabled data-i18n-title="plagasArandano.reviewAllTitle" title="">
              <i data-lucide="layout-grid" aria-hidden="true"></i>
              <span data-i18n="plagasArandano.reviewAll"></span>
            </button>
            <button type="button" id="pmpar-export-errors" class="pmpar-btn pmpar-btn--upload pmpar-btn--square" disabled data-i18n-title="plagasArandano.exportErrorsTitle" data-i18n-aria-label="plagasArandano.exportErrorsTitle" title="" aria-label="">
              <i data-lucide="file-down" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        </div>
      </div>

      <div class="pmpar-panel__section pmpar-panel__section--actions">
        <p class="pmpar-panel__eyebrow" data-i18n="plagasArandano.panelActions"></p>
        <div class="pmpar-toolbar pmpar-toolbar--actions">
          <div class="pmpar-actions">
            <button type="button" id="pmpar-run-review" class="pmpar-btn pmpar-btn--primary" disabled>
              <i data-lucide="play" aria-hidden="true"></i>
              <span data-i18n="plagasArandano.runReview"></span>
            </button>
            <button type="button" id="pmpar-export-filtered" class="pmpar-btn pmpar-btn--upload" disabled>
              <i data-lucide="file-spreadsheet" aria-hidden="true"></i>
              <span data-i18n="plagasArandano.exportFiltered"></span>
            </button>
            <button type="button" id="pmpar-clear" class="pmpar-btn pmpar-btn--ghost">
              <i data-lucide="rotate-ccw" aria-hidden="true"></i>
              <span data-i18n="plagasArandano.clear"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <aside
      id="pmpar-excel-insight"
      class="pmpar-excel-insight"
      data-i18n-aria-label="plagasArandano.excelInsightTitle"
      aria-label=""
    ></aside>
    </div>

    <div class="pmpar-guide" data-i18n-aria-label="plagasArandano.infoLead" aria-label="">
      <ol class="pmpar-guide__flow">
        <li class="pmpar-guide__step">
          <span class="pmpar-guide__step-index">01</span>
          <span class="pmpar-guide__step-icon" aria-hidden="true"><i data-lucide="file-check-2"></i></span>
          <p class="pmpar-guide__step-text" data-i18n="plagasArandano.infoItem1"></p>
        </li>
        <li class="pmpar-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="pmpar-guide__step">
          <span class="pmpar-guide__step-index">02</span>
          <span class="pmpar-guide__step-icon" aria-hidden="true"><i data-lucide="calendar-search"></i></span>
          <p class="pmpar-guide__step-text" data-i18n="plagasArandano.infoItem2"></p>
        </li>
        <li class="pmpar-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="pmpar-guide__step">
          <span class="pmpar-guide__step-index">03</span>
          <span class="pmpar-guide__step-icon" aria-hidden="true"><i data-lucide="layout-grid"></i></span>
          <p class="pmpar-guide__step-text" data-i18n="plagasArandano.infoItem3"></p>
        </li>
        <li class="pmpar-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="pmpar-guide__step">
          <span class="pmpar-guide__step-index">04</span>
          <span class="pmpar-guide__step-icon" aria-hidden="true"><i data-lucide="file-down"></i></span>
          <p class="pmpar-guide__step-text" data-i18n="plagasArandano.infoItem4"></p>
        </li>
        <li class="pmpar-guide__connector" aria-hidden="true"><i data-lucide="chevron-right"></i></li>
        <li class="pmpar-guide__step">
          <span class="pmpar-guide__step-index">05</span>
          <span class="pmpar-guide__step-icon" aria-hidden="true"><i data-lucide="refresh-cw"></i></span>
          <p class="pmpar-guide__step-text" data-i18n="plagasArandano.infoItem5"></p>
        </li>
      </ol>
    </div>

    <div id="pmpar-resumen-todas" class="pmpar-resumen" hidden></div>

    <div id="pmpar-review-stats" class="pmpar-mini-grid" hidden></div>

    <section id="pmpar-results-section" class="pmpar-results" aria-live="polite">
      <header class="pmpar-results__bar">
        <div class="pmpar-results__lead">
          <span id="pmpar-results-icon" class="pmpar-results__icon" aria-hidden="true">
            <i data-lucide="triangle-alert"></i>
          </span>
          <div>
            <h3 id="pmpar-results-title" class="pmpar-results__title" data-i18n="plagasArandano.errorRowsTitle"></h3>
            <p id="pmpar-results-subtitle" class="pmpar-results__subtitle"></p>
          </div>
        </div>
        <span id="pmpar-total-filas" class="pmpar-results__chip"></span>
      </header>
      <div class="pmpar-table-box">
        <table id="pmpar-results-table" class="pmpar-table" hidden>
          <thead>
            <tr id="pmpar-results-header"></tr>
          </thead>
          <tbody id="pmpar-results-body"></tbody>
        </table>
      </div>
    </section>

  </div>
</section>
