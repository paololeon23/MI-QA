<section id="moduleRoot" class="var-catalog-page">
  <div class="inicio-varieties__summary-grid var-catalog-page__summary" id="varCatalogStats"></div>

  <section class="var-catalog-page__genetics-section" id="varCatalogGeneticsSection" aria-labelledby="txtVarCatalogGeneticsTitle">
    <div class="var-catalog-page__genetics-head">
      <h3 class="var-catalog-page__genetics-title" id="txtVarCatalogGeneticsTitle" data-i18n="dashboard.geneticsGridTitle"></h3>
      <p class="var-catalog-page__genetics-meta" id="txtVarCatalogGeneticsMeta"></p>
    </div>
    <div class="var-catalog-page__genetics-grid" id="varCatalogGeneticsGrid"></div>
  </section>

  <article class="inicio-varieties__table-card var-catalog-page__panel" id="varCatalogTablePanel">
    <header class="inicio-varieties__table-card-head var-catalog-page__panel-head">
      <div class="inicio-varieties__scorecard-intro">
        <h3 class="inicio-varieties__table-card-title" data-i18n="dashboard.tableTitle"></h3>
        <p class="inicio-varieties__table-card-meta" id="txtVarCatalogCount"></p>
      </div>
      <div class="inicio-varieties__scorecard-actions var-catalog-page__toolbar" id="varCatalogToolbar">
        <label class="inicio-varieties__table-search var-catalog-page__search">
          <i data-lucide="search" aria-hidden="true"></i>
          <input
            type="search"
            id="inpVarCatalogSearch"
            class="inicio-varieties__table-search-input"
            data-i18n-placeholder="dashboard.searchPlaceholder"
            autocomplete="off"
          />
        </label>
        <label class="inicio-varieties__table-select-wrap">
          <select
            class="inicio-varieties__table-select var-catalog-page__select"
            id="selVarCatalogLicensor"
            data-i18n-aria-label="dashboard.colLicensor"
            aria-label="Genética"
          ></select>
        </label>
      </div>
    </header>

    <div class="inicio-varieties__table-scroll var-catalog-page__table-scroll">
      <table class="inicio-varieties__table var-catalog-page__table">
        <thead>
          <tr>
            <th scope="col">
              <button type="button" class="inicio-varieties__th-sort is-active" data-sort-key="code">
                <span data-i18n="dashboard.colCode"></span>
                <i data-lucide="arrow-up" class="inicio-varieties__sort-icon is-active" aria-hidden="true"></i>
              </button>
            </th>
            <th scope="col">
              <button type="button" class="inicio-varieties__th-sort" data-sort-key="variety">
                <span data-i18n="dashboard.colVariety"></span>
                <i data-lucide="arrow-up-down" class="inicio-varieties__sort-icon" aria-hidden="true"></i>
              </button>
            </th>
            <th scope="col">
              <button type="button" class="inicio-varieties__th-sort" data-sort-key="licensor">
                <span data-i18n="dashboard.colLicensor"></span>
                <i data-lucide="arrow-up-down" class="inicio-varieties__sort-icon" aria-hidden="true"></i>
              </button>
            </th>
            <th scope="col">
              <span data-i18n="dashboard.colEstado">Estado</span>
            </th>
          </tr>
        </thead>
        <tbody id="tblVarCatalogBody"></tbody>
      </table>
    </div>
  </article>
</section>
