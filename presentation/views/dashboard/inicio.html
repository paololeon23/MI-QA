<section id="moduleRoot" class="inicio-page">
  <header class="inicio-cover fade-in-up stagger-1">
    <div class="inicio-cover__panel">
      <div class="inicio-cover__scene">
        <img
          class="inicio-cover__bg"
          src="presentation/images/mi-portada.png"
          alt=""
          width="1672"
          height="941"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
        <div class="inicio-cover__overlay" aria-hidden="true"></div>
        <div class="inicio-cover__copy">
          <p class="inicio-cover__eyebrow" data-i18n="inicio.coverEyebrow"></p>
          <h2 class="inicio-cover__title" data-i18n="inicio.coverTitle"></h2>
          <p class="inicio-cover__subtitle" data-i18n="inicio.coverSubtitle"></p>
          <p class="inicio-cover__desc" data-i18n="inicio.coverDesc"></p>
          <ul class="inicio-cover__meta">
            <li class="inicio-cover__meta-item">
              <i data-lucide="map-pin" aria-hidden="true"></i>
              <span data-i18n="inicio.location"></span>
            </li>
            <li class="inicio-cover__meta-item inicio-cover__meta-item--live">
              <span class="inicio-cover__live-dot" aria-hidden="true"></span>
              <span data-i18n="inicio.coverLiveData"></span>
            </li>
          </ul>
        </div>
      </div>

      <aside class="inicio-cover__insight" id="coverInsightCard" aria-label="Validación del sistema"></aside>
    </div>
  </header>

  <section class="inicio-varieties fade-in-up" id="sectionVarietiesAnalytics">
    <div class="inicio-varieties__summary-grid">
      <aside class="inicio-varieties__crop-panel">
        <h3 class="inicio-varieties__crop-panel-title" id="txtActiveCropHectaresTitle" data-i18n="inicio.hectaresSectionTitle"></h3>
        <div class="inicio-varieties__crop-select-wrap">
          <div class="inicio-crop-select" id="cropSelectRoot"></div>
        </div>
      </aside>

      <div class="inicio-varieties__kpis" id="varietiesKpiStrip"></div>
    </div>

    <div class="inicio-varieties__charts">
      <article class="inicio-varieties__chart-card inicio-varieties__chart-card--donut">
        <div class="inicio-varieties__chart-head">
          <h4 class="inicio-varieties__chart-title" data-i18n="inicio.chartFundoArea"></h4>
          <div class="inicio-varieties__chart-filter">
            <div class="inicio-chart-filter-select" id="chartFilterDonutEtapa" data-chart-filter="donut-etapa"></div>
          </div>
        </div>
        <div class="inicio-varieties__chart-donut-slot">
          <div class="inicio-varieties__chart-wrap inicio-varieties__chart-wrap--donut">
            <canvas id="chartInicioFundoArea" aria-label="Distribución por fundo"></canvas>
            <div class="inicio-varieties__chart-center" aria-hidden="true">
              <strong id="txtInicioTotalArea">—</strong>
              <span data-i18n="inicio.chartTotalHa"></span>
            </div>
          </div>
        </div>
        <ul class="inicio-varieties__chart-legend" id="inicioFundoChartLegend"></ul>
      </article>
      <div class="inicio-varieties__charts-stack">
        <article class="inicio-varieties__chart-card inicio-varieties__chart-card--varieties">
          <div class="inicio-varieties__chart-head">
            <h4 class="inicio-varieties__chart-title" data-i18n="inicio.chartTopVarieties"></h4>
            <div class="inicio-varieties__chart-filter">
              <div class="inicio-chart-filter-select" id="chartFilterVarietiesFundo" data-chart-filter="varieties-fundo"></div>
            </div>
          </div>
          <div class="inicio-varieties__chart-wrap inicio-varieties__chart-wrap--varieties">
            <canvas id="chartInicioTopVarieties" aria-label="Variedades principales"></canvas>
          </div>
        </article>
        <article class="inicio-varieties__chart-card inicio-varieties__chart-card--etapas">
          <div class="inicio-varieties__chart-head">
            <h4 class="inicio-varieties__chart-title" data-i18n="inicio.chartEtapaArea"></h4>
            <div class="inicio-varieties__chart-filter">
              <div class="inicio-chart-filter-select" id="chartFilterEtapasFundo" data-chart-filter="etapas-fundo"></div>
            </div>
          </div>
          <div class="inicio-varieties__chart-wrap inicio-varieties__chart-wrap--etapas">
            <canvas id="chartInicioEtapaArea" aria-label="Área por etapa"></canvas>
          </div>
        </article>
      </div>
    </div>

    <div class="inicio-varieties__tables" id="varietiesTablesRoot"></div>
  </section>
</section>
