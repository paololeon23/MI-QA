<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" role="img" aria-label="Traceability and export">
  <defs>
    <linearGradient id="traceGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6fd4"/>
      <stop offset="100%" stop-color="#0f3d7a"/>
    </linearGradient>
    <linearGradient id="traceGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00a67e"/>
      <stop offset="100%" stop-color="#0d9f6e"/>
    </linearGradient>
    <filter id="traceShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0d1b2a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Globe -->
  <circle cx="200" cy="180" r="100" fill="#e8f2fc" filter="url(#traceShadow)"/>
  <ellipse cx="200" cy="180" rx="100" ry="40" stroke="url(#traceGrad1)" stroke-width="2" fill="none" opacity="0.4"/>
  <ellipse cx="200" cy="180" rx="40" ry="100" stroke="url(#traceGrad1)" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Route path -->
  <path d="M120 200 Q200 120 280 200" stroke="url(#traceGrad2)" stroke-width="3" fill="none" stroke-dasharray="8 4"/>
  <circle cx="120" cy="200" r="8" fill="url(#traceGrad2)"/>
  <circle cx="280" cy="200" r="8" fill="url(#traceGrad1)"/>
  <!-- Container box -->
  <rect x="140" y="280" width="120" height="80" rx="8" fill="url(#traceGrad1)" filter="url(#traceShadow)"/>
  <rect x="155" y="295" width="90" height="8" rx="2" fill="#ffffff" opacity="0.5"/>
  <rect x="155" y="315" width="60" height="8" rx="2" fill="#ffffff" opacity="0.3"/>
  <!-- QR code hint -->
  <rect x="260" y="300" width="50" height="50" rx="6" fill="#ffffff" filter="url(#traceShadow)"/>
  <rect x="268" y="308" width="12" height="12" rx="2" fill="url(#traceGrad1)"/>
  <rect x="286" y="308" width="12" height="12" rx="2" fill="url(#traceGrad1)"/>
  <rect x="268" y="326" width="12" height="12" rx="2" fill="url(#traceGrad1)"/>
</svg>
