<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" role="img" aria-label="AI automation">
  <defs>
    <linearGradient id="aiGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6fd4"/>
      <stop offset="100%" stop-color="#0f3d7a"/>
    </linearGradient>
    <linearGradient id="aiGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a67e"/>
      <stop offset="100%" stop-color="#1a6fd4"/>
    </linearGradient>
    <filter id="aiShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d1b2a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Brain / AI node -->
  <circle cx="200" cy="160" r="70" fill="url(#aiGrad1)" filter="url(#aiShadow)"/>
  <circle cx="200" cy="160" r="50" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Neural connections -->
  <line x1="200" y1="90" x2="200" y2="50" stroke="url(#aiGrad2)" stroke-width="2"/>
  <line x1="270" y1="160" x2="310" y2="160" stroke="url(#aiGrad2)" stroke-width="2"/>
  <line x1="130" y1="160" x2="90" y2="160" stroke="url(#aiGrad2)" stroke-width="2"/>
  <circle cx="200" cy="50" r="10" fill="url(#aiGrad2)"/>
  <circle cx="310" cy="160" r="10" fill="url(#aiGrad2)"/>
  <circle cx="90" cy="160" r="10" fill="url(#aiGrad2)"/>
  <!-- Document stack -->
  <rect x="120" y="260" width="160" height="100" rx="10" fill="#e8f2fc" filter="url(#aiShadow)"/>
  <rect x="130" y="250" width="160" height="100" rx="10" fill="#ffffff" filter="url(#aiShadow)"/>
  <rect x="145" y="270" width="80" height="6" rx="3" fill="url(#aiGrad1)" opacity="0.4"/>
  <rect x="145" y="290" width="120" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="145" y="310" width="100" height="6" rx="3" fill="#cbd5e1"/>
  <!-- Sparkle -->
  <path d="M200 130 L204 142 L216 146 L204 150 L200 162 L196 150 L184 146 L196 142 Z" fill="#ffffff" opacity="0.8"/>
</svg>
